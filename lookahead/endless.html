    <script>
        const lookahead = 4;
        const synth = new Tone.Synth().toDestination();

        let nextNumberToClick = 1;
        let positions = [];
        let interval;

        for (let i = 1; i <= lookahead; i++) {
            let randomSquare = Math.floor(Math.random() * 64) + 1;
            while (positions.includes(randomSquare)) {
                randomSquare = Math.floor(Math.random() * 64) + 1;
            }
            document.getElementById(randomSquare).innerText = i;
            positions.push(randomSquare);
        }
        for (let i = 1; i <= 64; i++) {
            document.getElementById(i).addEventListener('click', function() {
                if (positions[nextNumberToClick-1] === parseInt(this.id)) {
                    synth.triggerAttackRelease(["C4", "D4", "E4", "F4", "G4", "A4", "B4", "C5", "B4", "A4", "G4", "F4", "E4", "D4"][(nextNumberToClick-1)%14], "32n");
                    document.getElementById("score").innerText = nextNumberToClick;
                    if (nextNumberToClick === 1) {
                        if (!window.startTime) {
                            window.startTime = Date.now();
                            interval = setInterval(() => {
                                if (window.startTime) {
                                    const elapsed = Date.now() - window.startTime;
                                    const minutes = Math.floor(elapsed / 60000).toString().padStart(2, '0');
                                    const seconds = Math.floor((elapsed % 60000) / 1000).toString().padStart(2, '0');
                                    const milliseconds = (elapsed % 1000).toString().padStart(3, '0');
                                    document.getElementById("time").innerText = `${minutes}:${seconds}.${milliseconds}`;
                                }
                            }, 7);
                        }
                        for (let j = 2; j <= lookahead; j++) {
                            document.getElementById(positions[j-1]).innerText = '';
                        }
                    }
                    this.style.backgroundColor = 'limegreen';
                    this.style.color = 'limegreen';
                    setTimeout(() => {
                        this.style.transition = 'background-color 0.3s ease, color 0.3s ease';
                        this.style.backgroundColor = 'black';
                        this.style.color = 'black';
                        this.innerText = "";
                        setTimeout(() => {
                            this.style.transition = 'none';
                        }, 300);
                    }, 10);
                    nextNumberToClick++;

                    if (nextNumberToClick > 2) {
                        document.getElementById(positions[nextNumberToClick+lookahead-3]).style.transition = 'background-color 0.3s ease, color 0.3s ease';
                        document.getElementById(positions[nextNumberToClick+lookahead-3]).style.backgroundColor = 'black';
                        document.getElementById(positions[nextNumberToClick+lookahead-3]).style.color = 'black';
                        document.getElementById(positions[nextNumberToClick+lookahead-3]).style.transition = 'none';
                        document.getElementById(positions[nextNumberToClick+lookahead-3]).innerText = "";
                    }

                    let randomSquare = Math.floor(Math.random() * 64) + 1;
                    while (positions.slice(64*Math.floor((nextNumberToClick+lookahead-2)/64)).includes(randomSquare)) {
                        randomSquare = Math.floor(Math.random() * 64) + 1;
                    }
                    document.getElementById(randomSquare).innerText = nextNumberToClick+lookahead-1;
                    document.getElementById(randomSquare).style.backgroundColor = 'black';
                    document.getElementById(randomSquare).style.color = 'white';
                    positions.push(randomSquare);
                } else {
                    synth.triggerAttackRelease("F2", "32n");
                    clearInterval(interval);
                    document.getElementById("time").style.color = 'red';
                    this.style.backgroundColor = 'red';
                    document.getElementById(positions[nextNumberToClick-1]).innerText = nextNumberToClick;
                    document.getElementById(positions[nextNumberToClick-1]).style.color = '#fa0';
                    for (let j = 1; j <= 64; j++) {
                        document.getElementById(j).style.pointerEvents = 'none';
                    }
                }
            });
        }
        document.addEventListener('keydown', function(event) {
            if (event.key === 'r' || event.key === 'R') {
                location.reload();
            }
        });
    </script>
